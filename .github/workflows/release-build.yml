# NOTE: PyPI Trusted Publishing must point at THIS file's name (the calling
# workflow), not wheels.yml — reusable workflows are validated by the top-level
# workflow_ref claim.
name: Build & attach Rust binaries (multi-platform)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}     # dry run: builds binaries + wheels + tars, no PyPI publish,
                            # no version sync (archives are named after the branch)

permissions:
  contents: write

jobs:
  # Build all PyPI wheels (with bundled binaries) via the reusable workflow.
  # Their artifacts (wheel-<tag>) are visible to this run's later jobs, and the
  # PyPI publish happens inside on tag pushes — same bytes go to PyPI and tars.
  wheels:
    name: Python wheels (reusable workflow)
    # Same-repo reusable workflow syntax: leading "./", NO @ref. GitHub resolves
    # this at the CALLER's commit (caller+callee versioned atomically). The path
    # must match the real filename exactly, the file must live directly in
    # .github/workflows/ (no subdirs), exist on the ref being run, and declare
    # `on: workflow_call`. Repo-form (owner/repo/...@ref) would require a ref and
    # would decouple the callee's version from the tag — don't.
    uses: ./.github/workflows/wheels.yml
    permissions:
      contents: read        # build-only: PyPI publishing moved to THIS caller.
                            # PyPI validates the job_workflow_ref claim (the file a
                            # job is defined in); inside a reusable workflow that
                            # points at wheels.yml, which PyPI doesn't support.

  build:
    name: Build ${{ matrix.asset_target }}
    needs: wheels           # packaging consumes the wheel artifacts from above
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------------------------
          # Linux (glibc baseline 2.32) - uses zigbuild
          # Produces artifacts that should run on systems with glibc >= 2.32
          # -------------------------
          - runs_on: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.32
            asset_target: x86_64-unknown-linux-gnu.2.32
            builder: zigbuild
            archive_ext: tar.gz
            wheel_artifact: wheel-manylinux2014_x86_64

          - runs_on: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.32
            asset_target: aarch64-unknown-linux-gnu.2.32
            builder: zigbuild
            archive_ext: tar.gz
            wheel_artifact: wheel-manylinux2014_aarch64

          - runs_on: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.43
            asset_target: x86_64-unknown-linux-gnu.2.43
            builder: zigbuild
            archive_ext: tar.gz
            wheel_artifact: wheel-manylinux2014_x86_64   # same wheel as 2.32: manylinux floor covers both

          - runs_on: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.43
            asset_target: aarch64-unknown-linux-gnu.2.43
            builder: zigbuild
            archive_ext: tar.gz
            wheel_artifact: wheel-manylinux2014_aarch64

          # -------------------------
          # Linux (musl) - uses zigbuild
          # -------------------------
          - runs_on: ubuntu-24.04
            rust_target: x86_64-unknown-linux-musl
            build_target: x86_64-unknown-linux-musl
            asset_target: x86_64-unknown-linux-musl
            builder: zigbuild
            archive_ext: tar.gz
            wheel_artifact: wheel-musllinux_1_2_x86_64

          - runs_on: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            build_target: aarch64-unknown-linux-musl
            asset_target: aarch64-unknown-linux-musl
            builder: zigbuild
            archive_ext: tar.gz
            wheel_artifact: wheel-musllinux_1_2_aarch64

          # -------------------------
          # FreeBSD (built inside VM) — NOT a PyPI platform, so the wheel is
          # built in the VM and exists only in this tar (wheel_artifact empty).
          # -------------------------
          - runs_on: ubuntu-24.04
            builder: freebsd-vm
            freebsd_release: "13.5"
            freebsd_arch: x86_64
            rust_target: x86_64-unknown-freebsd
            build_target: x86_64-unknown-freebsd
            asset_target: x86_64-unknown-freebsd13.5
            archive_ext: tar.gz
            wheel_artifact: ""

          - runs_on: ubuntu-24.04
            builder: freebsd-vm
            freebsd_release: "13.5"
            freebsd_arch: aarch64
            rust_target: aarch64-unknown-freebsd
            build_target: aarch64-unknown-freebsd
            asset_target: aarch64-unknown-freebsd13.5
            archive_ext: tar.gz
            wheel_artifact: ""

          # -------------------------
          # Windows (native cargo build)
          # -------------------------
          - runs_on: windows-2022
            rust_target: x86_64-pc-windows-msvc
            build_target: x86_64-pc-windows-msvc
            asset_target: x86_64-pc-windows-msvc
            builder: cargo
            archive_ext: zip
            wheel_artifact: wheel-win_amd64

          - runs_on: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            build_target: aarch64-pc-windows-msvc
            asset_target: aarch64-pc-windows-msvc
            builder: cargo
            archive_ext: zip
            wheel_artifact: wheel-win_arm64

          # -------------------------
          # macOS (native cargo build)
          # -------------------------
          - runs_on: macos-15-intel
            rust_target: x86_64-apple-darwin
            build_target: x86_64-apple-darwin
            asset_target: x86_64-apple-darwin
            builder: cargo
            archive_ext: tar.gz
            wheel_artifact: wheel-macosx_x86_64

          - runs_on: macos-15
            rust_target: aarch64-apple-darwin
            build_target: aarch64-apple-darwin
            asset_target: aarch64-apple-darwin
            builder: cargo
            archive_ext: tar.gz
            wheel_artifact: wheel-macosx_arm64

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python (for packaging)
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # Same sync as wheels.yml: stamps the tag version onto the workspace so the
      # FreeBSD VM wheel (and the binaries' CARGO_PKG_VERSION) match the release.
      # Ephemeral — this runner's checkout only. Skipped on workflow_dispatch.
      - name: Sync workspace version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          python - "$VER" <<'PY'
          import sys, re, pathlib, tomllib

          ver = sys.argv[1]
          binding = pathlib.Path("bindings/python/Cargo.toml")
          pkgver = tomllib.loads(binding.read_text()).get("package", {}).get("version")

          def set_version(path, section):
              txt = path.read_text()
              pat = re.compile(
                  r'(?ms)(^\[' + re.escape(section) + r'\].*?^\s*version\s*=\s*")[^"]*(")'
              )
              new, n = pat.subn(rf'\g<1>{ver}\g<2>', txt, count=1)
              if n == 0:
                  raise SystemExit(f'no `version = "..."` under [{section}] in {path}')
              path.write_text(new)
              print(f'set version {ver} under [{section}] in {path}')

          if isinstance(pkgver, str):
              set_version(binding, "package")
          elif isinstance(pkgver, dict) and pkgver.get("workspace") is True:
              set_version(pathlib.Path("Cargo.toml"), "workspace.package")
          else:
              raise SystemExit(
                  f"unexpected package.version = {pkgver!r} in {binding}; "
                  'expected a string or `version.workspace = true`'
              )
          PY

      - name: Install Rust (stable, with targets)
        if: matrix.builder != 'freebsd-vm'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Rust (stable, host-only for FreeBSD packaging)
        if: matrix.builder == 'freebsd-vm'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: matrix.builder != 'freebsd-vm'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.asset_target }}

      - name: Install Zig
        if: matrix.builder == 'zigbuild'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build (release, cargo)
        if: matrix.builder == 'cargo'
        run: cargo build --release --offline --bins --target ${{ matrix.build_target }}

      - name: Build (release, zigbuild)
        if: matrix.builder == 'zigbuild'
        run: cargo zigbuild --release --offline --bins --target ${{ matrix.build_target }}

      - name: Build (release, FreeBSD VM)
        if: matrix.builder == 'freebsd-vm'
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.freebsd_release }}
          arch: ${{ matrix.freebsd_arch }}
          usesh: true
          prepare: |
            pkg update -f
            pkg install -y rust python311 py311-pip
          run: |
            set -eu
            cd "$GITHUB_WORKSPACE"

            echo "FreeBSD:"; freebsd-version || true
            rustc -V
            cargo -V

            cargo build --release --offline --bins --target ${{ matrix.build_target }}

            # ---- Python wheel: FreeBSD is not a PyPI platform; the tar IS its channel ----
            # maturin has no FreeBSD prebuilt; pip compiles it from sdist with the
            # rust already installed (a few minutes). `pkg install py311-maturin`
            # is a faster substitute if the port is available for this release.
            python3.11 -m pip install --break-system-packages maturin wheel
            maturin build --release \
              --manifest-path bindings/python/Cargo.toml \
              --out wheelhouse

            # Same binary bundling as the PyPI wheels: orchestrator/producer/consumer
            # onto the venv PATH on install.
            BIN_BUILD_TARGET="${{ matrix.build_target }}" \
            RUST_TARGET="${{ matrix.rust_target }}" \
            WHEEL_DIR=wheelhouse \
              python3.11 .github/scripts/inject_bins_into_wheel.py

      # Non-FreeBSD targets: take the wheel from the wheels job in this same run —
      # identical bytes to what was published to PyPI.
      - name: Download matching Python wheel
        if: matrix.wheel_artifact != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.wheel_artifact }}
          path: wheelhouse

      - name: Package archive (all binaries + wheel)
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.build_target }}
          ASSET_TARGET: ${{ matrix.asset_target }}
          TAG: ${{ github.ref_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          # Optional override (repo variable): "parallel-tar parallel-idx view-idx"
          BIN_NAMES: ${{ vars.BIN_NAMES }}
          WHEEL_DIR: wheelhouse
          REQUIRE_WHEEL: "1"
        run: python .github/scripts/package_release.py

      - name: Upload artifact (for release job)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  # PyPI publish lives in THIS file, not wheels.yml: Trusted Publishing matches
  # the job_workflow_ref claim — the workflow file the job is DEFINED in — and
  # reusable workflows are unsupported. Here, job_workflow_ref == workflow_ref ==
  # release-build.yml, matching the registered publisher exactly.
  publish:
    name: Publish to PyPI
    needs: [wheels, build]    # publish only once the ENTIRE release is green —
                              # PyPI versions are immutable, so no early uploads
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheel-*        # PyPI-eligible wheels only; the FreeBSD wheel is
          merge-multiple: true    # tar-only by design (PyPI rejects its platform tag)

      - name: List artifacts
        run: ls -l dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true     # idempotent reruns after a partial upload

  release:
    name: Attach artifacts to GitHub Release
    needs: [build, wheels]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.whl
          generate_release_notes: true
          fail_on_unmatched_files: true
