name: Build Python wheels & publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}        # manual runs build wheels but do NOT publish (see `publish` job guard)

permissions:
  contents: read

jobs:
  wheels:
    name: Wheel ${{ matrix.wheel_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------- Linux glibc: ONE wheel per arch at the manylinux2014 floor (glibc 2.17).
          # The bundled binaries are built at the SAME floor (bin_target …gnu.2.17) so the
          # manylinux tag stays honest. These are separate from the .2.32/.2.43 binaries
          # the release-tar workflow ships. --------
          - runs_on: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            bin_target: x86_64-unknown-linux-gnu.2.17
            wheel_tag: manylinux2014_x86_64
            compat: manylinux2014
            os_family: linux
          - runs_on: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            bin_target: aarch64-unknown-linux-gnu.2.17
            wheel_tag: manylinux2014_aarch64
            compat: manylinux2014
            os_family: linux

          # -------- Linux musl (static) --------
          - runs_on: ubuntu-24.04
            rust_target: x86_64-unknown-linux-musl
            bin_target: x86_64-unknown-linux-musl
            wheel_tag: musllinux_1_2_x86_64
            compat: musllinux_1_2
            os_family: linux
          - runs_on: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            bin_target: aarch64-unknown-linux-musl
            wheel_tag: musllinux_1_2_aarch64
            compat: musllinux_1_2
            os_family: linux

          # -------- macOS (native) --------
          - runs_on: macos-15-intel
            rust_target: x86_64-apple-darwin
            bin_target: x86_64-apple-darwin
            wheel_tag: macosx_x86_64
            os_family: macos
          - runs_on: macos-15
            rust_target: aarch64-apple-darwin
            bin_target: aarch64-apple-darwin
            wheel_tag: macosx_arm64
            os_family: macos

          # -------- Windows (native) --------
          - runs_on: windows-2022
            rust_target: x86_64-pc-windows-msvc
            bin_target: x86_64-pc-windows-msvc
            wheel_tag: win_amd64
            os_family: windows
          - runs_on: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            bin_target: aarch64-pc-windows-msvc
            wheel_tag: win_arm64
            os_family: windows

          # NOTE: FreeBSD is intentionally absent — it is not a PyPI wheel platform.
          # FreeBSD bindings are built in the FreeBSD VM and shipped in the release
          # tar (model 2), not here.

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python (build interpreter; abi3 floor is 3.9 regardless)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust (stable, with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheels-${{ matrix.wheel_tag }}

      # zig + cargo-zigbuild are used for the Linux targets so the glibc/musl floor
      # is controlled on the host (same toolchain the binaries workflow uses).
      - name: Install Zig
        if: matrix.os_family == 'linux'
        uses: mlugg/setup-zig@v2
      - name: Install cargo-zigbuild
        if: matrix.os_family == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install maturin + wheel tool
        shell: bash
        run: pip install "maturin>=1.7,<2.0" wheel

      # Keep the wheel version == the release tag, so PyPI uploads can't drift.
      # (PyPI versions are immutable; a mismatch is painful to undo.)
      # Handles both an explicit `version = "..."` in the binding AND a workspace-
      # inherited `version.workspace = true` (in which case the source of truth is
      # the root [workspace.package]). The edit is ephemeral — this runner's
      # checkout only — so it never touches your repo or the binaries workflow.
      - name: Sync wheel version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          python - "$VER" <<'PY'
          import sys, re, pathlib, tomllib

          ver = sys.argv[1]
          binding = pathlib.Path("bindings/python/Cargo.toml")
          pkgver = tomllib.loads(binding.read_text()).get("package", {}).get("version")

          def set_version(path, section):
              txt = path.read_text()
              pat = re.compile(
                  r'(?ms)(^\[' + re.escape(section) + r'\].*?^\s*version\s*=\s*")[^"]*(")'
              )
              new, n = pat.subn(rf'\g<1>{ver}\g<2>', txt, count=1)
              if n == 0:
                  raise SystemExit(f'no `version = "..."` under [{section}] in {path}')
              path.write_text(new)
              print(f'set version {ver} under [{section}] in {path}')

          if isinstance(pkgver, str):
              # binding carries its own explicit version
              set_version(binding, "package")
          elif isinstance(pkgver, dict) and pkgver.get("workspace") is True:
              # binding inherits from the workspace root
              set_version(pathlib.Path("Cargo.toml"), "workspace.package")
          else:
              raise SystemExit(
                  f"unexpected package.version = {pkgver!r} in {binding}; "
                  'expected a string or `version.workspace = true`'
              )
          PY

      # ---- Build the abi3 extension wheel ----
      - name: Build wheel (Linux, via zig at the chosen libc floor)
        if: matrix.os_family == 'linux'
        shell: bash
        run: >
          maturin build --release --zig
          --target ${{ matrix.rust_target }}
          --compatibility ${{ matrix.compat }}
          --manifest-path bindings/python/Cargo.toml
          --out dist

      - name: Build wheel (macOS / Windows, native)
        if: matrix.os_family != 'linux'
        shell: bash
        run: >
          maturin build --release
          --target ${{ matrix.rust_target }}
          --manifest-path bindings/python/Cargo.toml
          --out dist

      # ---- Build the binaries that ride inside the wheel ----
      # Linux: zigbuild pins the libc floor to match the wheel tag (gnu.2.17 / musl).
      - name: Build bundled binaries (Linux, zigbuild)
        if: matrix.os_family == 'linux'
        shell: bash
        run: cargo zigbuild --release --offline --bins --target ${{ matrix.bin_target }}

      - name: Build bundled binaries (macOS / Windows, native)
        if: matrix.os_family != 'linux'
        shell: bash
        run: cargo build --release --offline --bins --target ${{ matrix.bin_target }}

      # ---- Inject the binaries into the wheel's .data/scripts/ ----
      # (installers place these on the venv PATH and mark them executable)
      - name: Inject binaries into wheel
        shell: bash
        env:
          BIN_BUILD_TARGET: ${{ matrix.bin_target }}
          RUST_TARGET: ${{ matrix.rust_target }}
          # Same repo variable the release-tar packaging honors, so both
          # channels always ship the same set of binaries.
          BIN_NAMES: ${{ vars.BIN_NAMES }}
        run: python .github/scripts/inject_bins_into_wheel.py

      # ---- Verify: install the injected wheel into a clean venv ----
      # Catches the silent failure mode where a misnamed .data dir makes
      # installers treat the binaries as package payload instead of scripts.
      - name: Verify wheel installs with binaries (native)
        # musllinux wheels are excluded: pip refuses them on a glibc runner by
        # platform-tag rules — they get a real musl check in the Alpine step below.
        if: matrix.compat != 'musllinux_1_2'
        shell: bash
        run: |
          python -m venv _verify
          if [ -e _verify/Scripts/python.exe ]; then
            PY=_verify/Scripts/python.exe; VBIN=_verify/Scripts; EXE=.exe
          else
            PY=_verify/bin/python; VBIN=_verify/bin; EXE=
          fi
          "$PY" -m pip install --no-index --find-links dist qpipe-rs
          "$PY" -c "import qpipe, importlib.metadata as md; print('import OK, dist:', md.version('qpipe-rs'))"
          if [ ! -e "$VBIN/orchestrator$EXE" ]; then
            echo "orchestrator$EXE missing from $VBIN:"; ls -l "$VBIN"; exit 1
          fi
          if [ -z "$EXE" ] && [ ! -x "$VBIN/orchestrator" ]; then
            echo "orchestrator present but not executable"; exit 1
          fi
          echo "venv bin contents:"; ls -l "$VBIN"

      # musllinux wheels: verify inside an actual musl platform (Alpine container).
      # This is a stronger check than the native one — the musl-linked extension
      # really loads, and pip's tag matching runs against a genuine musl Python.
      # The container arch matches the runner arch, which matches the wheel arch.
      - name: Verify wheel installs with binaries (musllinux, Alpine container)
        if: matrix.compat == 'musllinux_1_2'
        shell: bash
        run: |
          cat > /tmp/verify.sh <<'EOF'
          set -e
          apk add --no-cache python3 py3-pip >/dev/null
          pip install --quiet --break-system-packages --no-index --find-links /dist qpipe-rs
          python3 -c 'import qpipe, importlib.metadata as md; print("import OK, dist:", md.version("qpipe-rs"))'
          BIN="$(command -v orchestrator)" || { echo "orchestrator not on PATH after install"; exit 1; }
          test -x "$BIN"
          echo "orchestrator at: $BIN"
          EOF
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v /tmp/verify.sh:/verify.sh:ro \
            alpine:3.20 sh /verify.sh

      - name: Show wheel
        shell: bash
        run: ls -l dist/

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.wheel_tag }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: wheels
    runs-on: ubuntu-24.04
    # Only publish on a real tag push — manual workflow_dispatch runs build but don't upload.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi               # PyPI Trusted Publisher: repo + wheels.yml + environment 'pypi', project 'qpipe-rs'
    permissions:
      id-token: write               # OIDC for Trusted Publishing (no API token in secrets)
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: List artifacts
        run: ls -l dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
